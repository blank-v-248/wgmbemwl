<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waaaaaaaaannn?</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #ddb4ec;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    font-family: Georgia, serif;
    overflow: hidden;
  }
  #btn {
    font-size: clamp(1.8rem, 8vw, 2rem);
    padding: clamp(16px, 4vw, 30px) clamp(30px, 10vw, 70px);
    background: transparent;
    color: #fff;
    border: 2px solid #9e42c0;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 4px;
    transition: all 0.3s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #btn:hover, #btn:active { border-color: #fff; background: rgba(255,255,255,0.05); }
  #countdown { display: none; text-align: center; color: #fff; padding: 20px; }
  #countdown .label { font-size: clamp(0.6rem, 2.5vw, 1rem); letter-spacing: 4px; color: #9e42c0; margin-bottom: 20px; }
  #countdown .units { display: flex; gap: clamp(12px, 4vw, 30px); justify-content: center; margin-top: 10px; }
  #countdown .unit span { display: block; }
  #countdown .unit .num { font-size: clamp(2rem, 12vw, 3rem); }
  #countdown .unit .lbl { font-size: clamp(0.5rem, 2vw, 0.65rem); letter-spacing: 3px; color: #9e42c0; margin-top: 4px; }
  canvas { position: fixed; top: 0; left: 0; pointer-events: none; }
  #horse {
    position: fixed;
    display: none;
    pointer-events: none;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="horse" width="32" height="32"></canvas>
<button id="btn" onclick="reveal()">Wann geht MiNki <br>endlich mal wieder laufen?</button>
<div id="countdown">
  <div class="label">NUR NOCH...</div>
  <div class="units">
    <div class="unit"><span class="num" id="d">00</span><span class="lbl">TAGE</span></div>
    <div class="unit"><span class="num" id="h">00</span><span class="lbl">STUNDEN</span></div>
    <div class="unit"><span class="num" id="m">00</span><span class="lbl">MINUTEN</span></div>
    <div class="unit"><span class="num" id="s">00</span><span class="lbl">SEKUNDEN</span></div>
  </div>
</div>

<script>
// --- Countdown ---
const target = new Date('2026-04-16T17:00:00');
const pad = n => String(n).padStart(2,'0');
function updateCountdown() {
  const diff = target - Date.now();
  if (diff <= 0) { document.getElementById('countdown').innerHTML = '<div class="label">IT\'S TIME!</div>'; return; }
  const s = Math.floor(diff/1000)%60, m = Math.floor(diff/60000)%60,
        h = Math.floor(diff/3600000)%24, d = Math.floor(diff/86400000);
  document.getElementById('d').textContent = pad(d);
  document.getElementById('h').textContent = pad(h);
  document.getElementById('m').textContent = pad(m);
  document.getElementById('s').textContent = pad(s);
}

// --- Confetti ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
let pieces = [], animating = false;

function spawnConfetti() {
  for (let i = 0; i < 180; i++) pieces.push({
    x: Math.random()*innerWidth, y: -20,
    vx: (Math.random()-0.5)*4, vy: Math.random()*4+2,
    color: `hsl(${Math.random()*360},90%,60%)`,
    w: Math.random()*10+5, h: Math.random()*5+3,
    rot: Math.random()*360, vr: (Math.random()-0.5)*6
  });
}

function animateConfetti() {
  if (!animating) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pieces = pieces.filter(p => p.y < canvas.height+20);
  pieces.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.vr;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle = p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();
  });
  if (pieces.length) requestAnimationFrame(animateConfetti);
  else { animating = false; ctx.clearRect(0,0,canvas.width,canvas.height); }
}

// --- Pixel Horse ---
const hc = document.getElementById('horse');
const hx = hc.getContext('2d');

// Horse size: fraction of smaller screen dimension, capped
function horseSize() { return Math.min(Math.round(Math.min(innerWidth, innerHeight) * 0.22), 160); }

const frames = [
  { legs: [[8,20],[11,23],[17,20],[20,23]], tailOff: 0 },
  { legs: [[9,22],[12,21],[18,22],[21,21]], tailOff: 1 },
  { legs: [[8,23],[11,20],[17,23],[20,20]], tailOff: 2 },
  { legs: [[9,21],[12,22],[18,21],[21,22]], tailOff: 1 },
];

function drawHorse(fi) {
  hx.clearRect(0,0,32,32);
  const p = (x,y,c) => { if(x<0||y<0||x>31||y>31) return; hx.fillStyle=c; hx.fillRect(x,y,1,1); };
  const r = (x,y,w,h,c) => { hx.fillStyle=c; hx.fillRect(x,y,w,h); };

  // Body
  r(7,13,16,7,'#c8862a');
  r(7,12,16,1,'#a06820');
  r(7,20,16,1,'#a06820');

  // Tail (x-sway so rows stay fixed — no blinking)
  const to = frames[fi].tailOff;
  [[6-to,14],[5,16],[4+to,18]].forEach(([tx,ty]) => r(tx,ty,2,2,'#f0c060'));

  // Neck
  r(21,9,4,6,'#c8862a');

  // Head
  r(22,5,6,5,'#c8862a');

  // Ear
  r(26,3,2,3,'#a06820');
  r(27,3,1,2,'#f0c060');

  // Mane (draw before face details so face is on top)
  r(21,7,2,5,'#f0c060');
  r(20,9,2,4,'#f0c060');
  r(22,5,1,3,'#f0c060');

  // Sunglasses
  r(23,6,7,2,'#111');
  r(26,6,1,2,'#111');
  r(22,6,1,1,'#888');
  r(30,6,1,1,'#888');
  p(24,6,'#444');
  p(28,6,'#444');

  // Nostril
  p(28,8,'#7a4f10');

  // Smile
  r(25,9,1,1,'#7a4f10');
  r(26,10,2,1,'#7a4f10');
  r(28,9,1,1,'#7a4f10');

  // Legs
  frames[fi].legs.forEach(([lx,ly]) => {
    r(lx,ly,2,5,'#a06820');
    r(lx,ly+5,2,1,'#444');
  });
}

let frameIdx=0, horseX=0, horseY=0, horseVX=4, horseVY=2, horseDir=1, horseVisible=false, horseTimer=null;

function animateHorse() {
  if (!horseVisible) return;
  frameIdx = (frameIdx+1) % 4;
  drawHorse(frameIdx);
  const hs = horseSize();
  horseX += horseVX; horseY += horseVY;
  if (horseX < 0) { horseX=0; horseVX=Math.abs(horseVX); horseDir=1; hc.style.transform='scaleX(1)'; }
  if (horseX > innerWidth-hs) { horseX=innerWidth-hs; horseVX=-Math.abs(horseVX); horseDir=-1; hc.style.transform='scaleX(-1)'; }
  if (horseY < 0) { horseY=0; horseVY=Math.abs(horseVY); }
  if (horseY > innerHeight-hs) { horseY=innerHeight-hs; horseVY=-Math.abs(horseVY); }
  hc.style.left=horseX+'px'; hc.style.top=horseY+'px';
  horseTimer = setTimeout(animateHorse, 110);
}

function launchHorse() {
  if (horseTimer) clearTimeout(horseTimer);
  const hs = horseSize();
  hc.style.width = hs + 'px';
  hc.style.height = hs + 'px';
  const angle = Math.random()*Math.PI*2;
  const speed = 3 + Math.random()*3;
  horseX = Math.random()*Math.max(1, innerWidth-hs);
  horseY = Math.random()*Math.max(1, innerHeight-hs);
  horseVX = Math.cos(angle)*speed;
  horseVY = Math.sin(angle)*speed;
  horseDir = horseVX>=0?1:-1;
  hc.style.transform = horseDir===-1?'scaleX(-1)':'scaleX(1)';
  horseVisible = true;
  hc.style.display = 'block';
  drawHorse(0);
  hc.style.left=horseX+'px'; hc.style.top=horseY+'px';
  animateHorse();
  setTimeout(() => { horseVisible=false; hc.style.display='none'; clearTimeout(horseTimer); }, 4000);
}

function reveal() {
  document.getElementById('btn').style.display = 'none';
  document.getElementById('countdown').style.display = 'block';
  updateCountdown();
  setInterval(updateCountdown, 1000);
  spawnConfetti(); animating = true; animateConfetti();
  setTimeout(launchHorse, 800);
  setInterval(launchHorse, 15000);
}
</script>
</body>
</html>
